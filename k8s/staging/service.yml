# ── Cache (Redis) Service ────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: taskflow-redis
  namespace: taskflow-staging
spec:
  type: ClusterIP
  selector:
    app: taskflow-redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── Backend Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: taskflow-backend
  namespace: taskflow-staging
spec:
  type: NodePort
  selector:
    app: taskflow-backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001

---
# ── Frontend Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: taskflow-frontend
  namespace: taskflow-staging
spec:
  type: LoadBalancer
  selector:
    app: taskflow-frontend
  ports:
    - port: 80
      targetPort: 80
