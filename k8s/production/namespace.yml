apiVersion: v1
kind: Namespace
metadata:
  name: taskflow-production

---
# ── NetworkPolicy (Production) ────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-backend
  namespace: taskflow-production
spec:
  podSelector:
    matchLabels:
      app: taskflow-redis
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: taskflow-backend
      ports:
        - protocol: TCP
          port: 6379
