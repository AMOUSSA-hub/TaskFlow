# ── Cache (Redis) Service ────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: taskflow-redis
  namespace: taskflow-production
spec:
  type: ClusterIP
  selector:
    app: taskflow-redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── Backend Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: taskflow-backend
  namespace: taskflow-production
spec:
  type: NodePort
  selector:
    app: taskflow-backend
  ports:
    - port: 3001
      targetPort: 3001
      # Note: Pas de nodePort fixe en production généralement, ou un NodePort différent de staging
      nodePort: 30002

---
# ── Frontend Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: taskflow-frontend
  namespace: taskflow-production
spec:
  type: LoadBalancer
  selector:
    app: taskflow-frontend
  ports:
    - port: 80
      targetPort: 80

---
# ── Ingress (Production) ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-ingress
  namespace: taskflow-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: taskflow.prod.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskflow-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: taskflow-backend
                port:
                  number: 3001
